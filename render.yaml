# Render infrastructure-as-code config for weightwAIse
# Deploys: FastAPI backend + PostgreSQL database
#
# To deploy:
#   1. Sign up at https://render.com and connect your GitHub account
#   2. In the Render dashboard, click "New +" -> "Blueprint"
#   3. Point it at this repository; Render will read render.yaml
#   4. Fill in the secret env vars (GEMINI_API_KEY, PINECONE_API_KEY, JWT_SECRET)
#   5. First deploy will create the Postgres DB and seed the `niloufar` user

services:
  - type: web
    name: weightwaise-backend
    runtime: python
    plan: free  # Upgrade to "starter" ($7/mo) to avoid cold-start spin-down
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true  # Deploy on every push to the main branch
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weightwaise-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # Set this manually to your Vercel production URL
        # Example: https://weightwaise.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: "^https://weightwaise(-[a-z0-9-]+)?\\.vercel\\.app$"
      - key: GEMINI_API_KEY
        sync: false  # Secret — set in Render dashboard
      - key: PINECONE_API_KEY
        sync: false  # Secret — set in Render dashboard
      - key: PINECONE_INDEX_NAME
        value: weightwaise
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: NCBI_EMAIL
        sync: false  # Optional — set if you plan to use PubMed ingestion
      - key: NCBI_API_KEY
        sync: false  # Optional
      - key: DEFAULT_LANGUAGE
        value: en
      - key: SEED_USER_USERNAME
        value: niloufar
      - key: SEED_USER_PASSWORD
        sync: false  # Set to "Niloufar@2026!" in Render dashboard (kept out of repo)
      - key: SEED_USER_FULL_NAME
        value: Niloufar
      - key: SEED_USER_ROLE
        value: patient
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: weightwaise-db
    plan: free  # Free tier expires after 90 days; upgrade to "basic-256mb" ($7/mo) for permanent
    region: oregon
    databaseName: weightwaise
    user: weightwaise
